<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./color.css">
  <title>Inventario Interactivo</title>
</head>

<body>
  <h1>Sistema de Inventario</h1>

  <section class="card">
    <h3>PRODUCTOS</h3>

    <section class="form-grid">
      <label for="nombre">Nombre:</label>

        <div class="contenedor-producto">
          <select id="nombre">
            
            <option value="">Seleccione un producto</option>
            <option value="Gorro de Lana" data-img="./imagenes/gorro.jpeg">Gorro de Lana</option>
            <option value="Bufanda" data-img="./imagenes/bufanda.jpeg">Bufanda</option>
            <option value="Guantes" data-img="./imagenes/guantes.jpeg">Guantes</option>
          </select>

          <img id="imagenProducto" src="./imagenes/gorro.jpeg" alt="Producto" width="120">
        </div>
      <section></section>

      <label for="cantidad">Cantidad:</label>
      <input type="number" id="cantidad">

      <button id="btnAgregar" class="btn-form">Agregar</button>

      <label for="precio">Precio unitario:</label>
      <input type="number" id="precio">

      <section></section>
    </section>
  </section>

  <section class="card">
    <h3>Inventario</h3>

    <table id="tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Total</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <section class="total" id="totalGeneral">
      Total general: $0
    </section>
  </section>

  <script src="./codigo.js" defer></script>
</body>

</html>
